<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>景品振り分けツール</title>
<style>
  :root {
    --bg: #0a0c14;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e3a5f;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --danger: #ef4444;
    --success: #22c55e;
    --radius: 10px;
    --font: 'Segoe UI', 'Hiragino Sans', 'Yu Gothic', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; padding: 0 0 80px; }

  header {
    background: linear-gradient(135deg, #0d1b2e 0%, #0a0c14 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
    position: sticky; top: 0; z-index: 100;
  }
  header h1 {
    font-size: clamp(16px, 4vw, 22px); font-weight: 700; letter-spacing: .05em;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  header p { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

  main { max-width: 900px; margin: 0 auto; padding: 24px 16px; }
  section { margin-bottom: 32px; }

  .section-title {
    font-size: 13px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* DROP ZONE */
  .drop-area {
    border: 2px dashed var(--border); border-radius: var(--radius);
    padding: 40px 24px; text-align: center; background: var(--surface);
    transition: all .2s;
  }
  .drop-area.dragover { border-color: var(--accent); background: #0d1b2e; }
  .drop-area .drop-icon { font-size: 36px; margin-bottom: 12px; }
  .drop-area p { color: var(--text-muted); font-size: 14px; line-height: 1.6; }
  .drop-area .drop-hint { font-size: 12px; color: var(--text-muted); margin-top: 6px; }

  /* ファイル選択ボタン（モバイル対応） */
  .file-select-btn {
    display: inline-block; margin-top: 16px;
    background: var(--accent2); color: #fff;
    padding: 10px 24px; border-radius: 8px;
    font-size: 14px; font-weight: 700; cursor: pointer;
    transition: opacity .2s;
  }
  .file-select-btn:hover { opacity: .85; }

  /* STATUS BAR */
  #status-bar {
    display: none; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 16px;
    font-size: 13px; color: var(--accent); margin-bottom: 20px;
  }

  /* GIFT LIST */
  #gift-section { display: none; }
  .gift-list { display: flex; flex-direction: column; gap: 8px; }
  .gift-item {
    display: grid; grid-template-columns: 1fr auto auto;
    align-items: center; gap: 10px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 14px; transition: border-color .2s;
  }
  .gift-item.has-file { border-color: var(--accent2); }
  .gift-name { font-size: 14px; font-weight: 600; word-break: break-all; }
  .gift-rarity {
    font-size: 11px; padding: 2px 8px; border-radius: 20px;
    font-weight: 700; white-space: nowrap;
  }
  .rarity-N   { background: #374151; color: #9ca3af; }
  .rarity-R   { background: #1e3a5f; color: #60a5fa; }
  .rarity-SR  { background: #3b1f6e; color: #c084fc; }
  .rarity-SSR { background: #7c2d12; color: #fb923c; }
  .rarity-UR  { background: #7f1d1d; color: #fca5a5; }
  .rarity-other { background: #1f2937; color: #94a3b8; }
  .gift-file-label {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-size: 12px; padding: 6px 12px;
    border-radius: 6px; cursor: pointer; white-space: nowrap; transition: all .2s;
    font-family: var(--font);
  }
  .gift-file-label:hover { border-color: var(--accent); color: var(--accent); }
  .gift-file-label.attached { border-color: var(--success); color: var(--success); }
  .gift-filename {
    grid-column: 1 / -1; font-size: 11px; color: var(--success);
    padding-top: 2px; display: none;
  }
  .gift-filename.show { display: block; }

  /* LISTENER LIST */
  #listener-section { display: none; }
  .listener-grid { display: flex; flex-direction: column; gap: 12px; }
  .listener-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
  }
  .listener-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; cursor: pointer; gap: 12px;
  }
  .listener-header:hover { background: var(--surface2); }
  .listener-name { font-size: 15px; font-weight: 700; flex: 1; }
  .listener-count { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
  .listener-dl-btn {
    background: var(--accent2); color: #fff; border: none;
    padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 700;
    cursor: pointer; white-space: nowrap; transition: opacity .2s; font-family: var(--font);
  }
  .listener-dl-btn:hover { opacity: .85; }
  .collapse-arrow { font-size: 12px; color: var(--text-muted); transition: transform .2s; flex-shrink: 0; }
  .listener-card.open .collapse-arrow { transform: rotate(180deg); }
  .listener-gifts { display: none; padding: 0 16px 14px; border-top: 1px solid var(--border); }
  .listener-card.open .listener-gifts { display: block; }
  .listener-gift-tag {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 10px; font-size: 12px;
    margin: 6px 4px 0 0;
  }
  .listener-gift-tag.has-file { border-color: var(--accent2); color: var(--accent); }
  .listener-gift-tag .tag-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-muted); flex-shrink: 0;
  }
  .listener-gift-tag.has-file .tag-dot { background: var(--accent); }

  /* BULK DL */
  #bulk-section { display: none; }
  .bulk-dl-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent2), #4f46e5);
    border: none; color: #fff; font-size: 15px; font-weight: 700;
    padding: 16px 24px; border-radius: var(--radius); cursor: pointer;
    letter-spacing: .05em; transition: opacity .2s; font-family: var(--font);
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .bulk-dl-btn:hover { opacity: .9; }
  .reset-btn {
    background: transparent; border: 1px solid var(--danger); color: var(--danger);
    padding: 8px 20px; border-radius: 6px; font-size: 13px;
    cursor: pointer; margin-top: 12px; transition: all .2s; font-family: var(--font);
  }
  .reset-btn:hover { background: var(--danger); color: #fff; }

  /* LOADING */
  .loading-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.7); z-index: 999;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 16px; font-size: 14px; color: var(--accent);
  }
  .loading-overlay.show { display: flex; }
  .spinner {
    width: 40px; height: 40px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 10px 20px; border-radius: 8px;
    font-size: 13px; transition: transform .3s; z-index: 1000; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--success); color: var(--success); }
  .toast.error { border-color: var(--danger); color: var(--danger); }

  @media (max-width: 480px) {
    .gift-item { grid-template-columns: 1fr auto; }
    .gift-rarity { display: none; }
  }
</style>
</head>
<body>

<header>
  <h1>景品振り分けツール</h1>
  <p>闇ガチャCSVを読み込んで、リスナーごとに景品をまとめてDL</p>
</header>

<main>

  <!-- STEP 1 -->
  <section id="step1-section">
    <div class="section-title">STEP 1 ── CSV読み込み</div>
    <div class="drop-area" id="drop-area">
      <div class="drop-icon">📂</div>
      <p>CSVファイルをここにドロップ</p>
      <p class="drop-hint">配信補助ツール（闇ガチャ）からエクスポートしたCSV</p>
      <label class="file-select-btn">
        📁 ファイルを選択
        <input type="file" id="csv-file-input" accept=".csv" style="display:none">
      </label>
    </div>
  </section>

  <div id="status-bar"></div>

  <!-- STEP 2 -->
  <section id="gift-section">
    <div class="section-title">STEP 2 ── 景品にファイルを登録</div>
    <p style="font-size:12px;color:var(--text-muted);margin-bottom:12px;">
      各景品にmp3・png・jpegなどを紐づけてください。未登録でもDL可能です。
    </p>
    <div class="gift-list" id="gift-list"></div>
  </section>

  <!-- STEP 3 -->
  <section id="listener-section">
    <div class="section-title">STEP 3 ── リスナーごとに確認・DL</div>
    <div class="listener-grid" id="listener-grid"></div>
  </section>

  <!-- STEP 4 -->
  <section id="bulk-section">
    <div class="section-title">STEP 4 ── 全員まとめてDL</div>
    <button class="bulk-dl-btn" id="bulk-dl-btn">📦 全リスナーのZIPをまとめてダウンロード</button>
    <br>
    <button class="reset-btn" id="reset-btn">🔄 リセットして最初から</button>
  </section>

</main>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div id="loading-msg">ZIPを作成中...</div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
'use strict';

// ===== STATE =====
let giftMap = {};     // { giftName: { rarity, file } }
let listenerMap = {}; // { listenerName: Set<giftName> }

// ===== UTILS =====
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = 'toast'; }, 2800);
}

function showLoading(msg) {
  document.getElementById('loading-msg').textContent = msg || 'ZIPを作成中...';
  document.getElementById('loading').classList.add('show');
}
function hideLoading() {
  document.getElementById('loading').classList.remove('show');
}

function showSection(id) {
  document.getElementById(id).style.display = 'block';
}
function hideSection(id) {
  document.getElementById(id).style.display = 'none';
}

function rarityClass(r) {
  const u = (r || '').toUpperCase().trim();
  if (u === 'N')   return 'rarity-N';
  if (u === 'R')   return 'rarity-R';
  if (u === 'SR')  return 'rarity-SR';
  if (u === 'SSR') return 'rarity-SSR';
  if (u === 'UR')  return 'rarity-UR';
  return 'rarity-other';
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== CSV PARSE =====
function parseCSVLine(line) {
  const cols = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (ch === ',' && !inQ) {
      cols.push(cur.trim()); cur = '';
    } else {
      cur += ch;
    }
  }
  cols.push(cur.trim());
  return cols;
}

function parseCSV(text) {
  const clean = text.replace(/^\uFEFF/, '');
  const lines = clean.split(/\r?\n/);
  const results = [];
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    if (i === 0 && /リスナー|listener/i.test(line)) continue;
    const cols = parseCSVLine(line);
    if (cols.length < 3) continue;
    const [listener, rarity, gift] = cols;
    if (!listener || !gift) continue;
    results.push({ listener, rarity: rarity || '', gift });
  }
  return results;
}

// ===== BUILD MAPS =====
function buildMaps(rows) {
  giftMap = {};
  listenerMap = {};
  for (const { listener, rarity, gift } of rows) {
    if (!giftMap[gift]) giftMap[gift] = { rarity, file: null };
    if (!listenerMap[listener]) listenerMap[listener] = new Set();
    listenerMap[listener].add(gift);
  }
}

// ===== RENDER =====
function renderAll(rows) {
  renderStatus(rows);
  renderGiftList();
  renderListenerGrid();
  showSection('status-bar');
  showSection('gift-section');
  showSection('listener-section');
  showSection('bulk-section');
}

function renderStatus(rows) {
  const bar = document.getElementById('status-bar');
  const lCount = Object.keys(listenerMap).length;
  const gCount = Object.keys(giftMap).length;
  bar.textContent = `✅ 読み込み完了 ── ${rows.length}件 / リスナー ${lCount}人 / 景品 ${gCount}種類`;
}

function renderGiftList() {
  const el = document.getElementById('gift-list');
  el.innerHTML = '';
  for (const [name, info] of Object.entries(giftMap)) {
    const item = document.createElement('div');
    item.className = 'gift-item' + (info.file ? ' has-file' : '');
    item.dataset.gift = name;

    // ファイル入力を別途作成してattach（innerHTMLだとイベントが消えるため）
    const nameEl = document.createElement('div');
    nameEl.className = 'gift-name';
    nameEl.textContent = name;

    const rarEl = document.createElement('span');
    rarEl.className = 'gift-rarity ' + rarityClass(info.rarity);
    rarEl.textContent = info.rarity || '?';

    const label = document.createElement('label');
    label.className = 'gift-file-label' + (info.file ? ' attached' : '');
    label.textContent = info.file ? '✅ ' + info.file.name : '📎 ファイル選択';

    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = 'audio/*,image/*,video/*,.zip,.pdf,.txt';
    fileInput.style.display = 'none';
    fileInput.dataset.gift = name;
    fileInput.addEventListener('change', onGiftFileChange);
    label.appendChild(fileInput);

    const fnEl = document.createElement('div');
    fnEl.className = 'gift-filename' + (info.file ? ' show' : '');
    fnEl.textContent = info.file ? info.file.name : '';

    item.appendChild(nameEl);
    item.appendChild(rarEl);
    item.appendChild(label);
    item.appendChild(fnEl);
    el.appendChild(item);
  }
}

function onGiftFileChange(e) {
  const giftName = e.target.dataset.gift;
  const file = e.target.files[0];
  if (!file || !giftMap[giftName]) return;
  giftMap[giftName].file = file;

  const item = document.querySelector(`.gift-item[data-gift="${CSS.escape(giftName)}"]`);
  if (item) {
    item.classList.add('has-file');
    const label = item.querySelector('.gift-file-label');
    label.classList.add('attached');
    // テキストノードだけ変更
    label.firstChild.textContent = '✅ ' + file.name;
    const fn = item.querySelector('.gift-filename');
    fn.textContent = file.name;
    fn.classList.add('show');
  }
  updateListenerTags(giftName);
  showToast(`「${giftName}」を登録しました`, 'success');
}

function updateListenerTags(giftName) {
  const tags = document.querySelectorAll(`.listener-gift-tag[data-gift="${CSS.escape(giftName)}"]`);
  const has = !!giftMap[giftName]?.file;
  tags.forEach(t => { has ? t.classList.add('has-file') : t.classList.remove('has-file'); });
}

function renderListenerGrid() {
  const grid = document.getElementById('listener-grid');
  grid.innerHTML = '';
  for (const [name, gifts] of Object.entries(listenerMap)) {
    const giftsArr = Array.from(gifts);
    const card = document.createElement('div');
    card.className = 'listener-card';

    const header = document.createElement('div');
    header.className = 'listener-header';

    const nameEl = document.createElement('span');
    nameEl.className = 'listener-name';
    nameEl.textContent = name;

    const countEl = document.createElement('span');
    countEl.className = 'listener-count';
    countEl.textContent = giftsArr.length + '種類';

    const dlBtn = document.createElement('button');
    dlBtn.className = 'listener-dl-btn';
    dlBtn.textContent = '⬇ DL';
    dlBtn.addEventListener('click', e => { e.stopPropagation(); downloadListenerZip(name); });

    const arrow = document.createElement('span');
    arrow.className = 'collapse-arrow';
    arrow.textContent = '▼';

    header.appendChild(nameEl);
    header.appendChild(countEl);
    header.appendChild(dlBtn);
    header.appendChild(arrow);
    header.addEventListener('click', () => card.classList.toggle('open'));

    const giftsEl = document.createElement('div');
    giftsEl.className = 'listener-gifts';
    giftsArr.forEach(g => {
      const tag = document.createElement('span');
      tag.className = 'listener-gift-tag' + (giftMap[g]?.file ? ' has-file' : '');
      tag.dataset.gift = g;
      const dot = document.createElement('span');
      dot.className = 'tag-dot';
      tag.appendChild(dot);
      tag.appendChild(document.createTextNode(g));
      giftsEl.appendChild(tag);
    });

    card.appendChild(header);
    card.appendChild(giftsEl);
    grid.appendChild(card);
  }
}

// ===== ZIP =====
async function buildListenerZip(listenerName) {
  const zip = new JSZip();
  const gifts = Array.from(listenerMap[listenerName] || []);
  const seen = new Set();
  for (const giftName of gifts) {
    const info = giftMap[giftName];
    if (!info?.file) continue;
    let filename = info.file.name;
    if (seen.has(filename)) {
      const dot = filename.lastIndexOf('.');
      const base = dot >= 0 ? filename.slice(0, dot) : filename;
      const ext  = dot >= 0 ? filename.slice(dot) : '';
      let n = 2;
      while (seen.has(`${base}_${n}${ext}`)) n++;
      filename = `${base}_${n}${ext}`;
    }
    seen.add(filename);
    zip.file(filename, info.file);
  }
  const listText = gifts.map(g => g + (giftMap[g]?.file ? '' : '（ファイル未登録）')).join('\n');
  zip.file('景品リスト.txt', `${listenerName} さんへの景品\n\n${listText}`);
  return zip;
}

async function downloadListenerZip(name) {
  showLoading(`${name} さんのZIPを作成中...`);
  try {
    const zip = await buildListenerZip(name);
    const blob = await zip.generateAsync({ type: 'blob' });
    triggerDownload(blob, `${name}.zip`);
    showToast(`${name}.zip をダウンロードしました`, 'success');
  } catch(e) {
    showToast('ZIPの作成に失敗しました', 'error');
    console.error(e);
  } finally {
    hideLoading();
  }
}

async function downloadAllZip() {
  showLoading('全リスナーのZIPを作成中...');
  try {
    const outer = new JSZip();
    for (const name of Object.keys(listenerMap)) {
      const inner = await buildListenerZip(name);
      const blob = await inner.generateAsync({ type: 'blob' });
      outer.file(`${name}.zip`, blob);
    }
    const blob = await outer.generateAsync({ type: 'blob' });
    triggerDownload(blob, '全リスナー景品.zip');
    showToast('全リスナーのZIPをダウンロードしました', 'success');
  } catch(e) {
    showToast('ZIPの作成に失敗しました', 'error');
    console.error(e);
  } finally {
    hideLoading();
  }
}

function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 3000);
}

// ===== CSV FILE HANDLING =====
function handleCSVFile(file) {
  if (!file) return;
  if (!file.name.toLowerCase().endsWith('.csv')) {
    showToast('CSVファイルを選択してください', 'error');
    return;
  }
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const rows = parseCSV(ev.target.result);
      if (rows.length === 0) {
        showToast('有効なデータが見つかりませんでした', 'error');
        return;
      }
      buildMaps(rows);
      renderAll(rows);
      showToast(`${rows.length}件を読み込みました`, 'success');
    } catch(err) {
      showToast('CSVの解析に失敗しました', 'error');
      console.error(err);
    }
  };
  reader.onerror = () => showToast('ファイルの読み込みに失敗しました', 'error');
  reader.readAsText(file, 'UTF-8');
}

// ===== EVENTS =====
const dropArea = document.getElementById('drop-area');
dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.classList.add('dragover'); });
dropArea.addEventListener('dragleave', () => dropArea.classList.remove('dragover'));
dropArea.addEventListener('drop', e => {
  e.preventDefault();
  dropArea.classList.remove('dragover');
  handleCSVFile(e.dataTransfer.files[0]);
});

document.getElementById('csv-file-input').addEventListener('change', e => {
  handleCSVFile(e.target.files[0]);
  e.target.value = ''; // 同じファイルを再選択できるようにリセット
});

document.getElementById('bulk-dl-btn').addEventListener('click', downloadAllZip);

document.getElementById('reset-btn').addEventListener('click', () => {
  if (!confirm('リセットしますか？CSVと紐づけたファイルがすべて消えます。')) return;
  giftMap = {}; listenerMap = {};
  hideSection('status-bar');
  hideSection('gift-section');
  hideSection('listener-section');
